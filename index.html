<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Você</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#f5ece9;
      color:#7a3e15;
    }

    /* =======================
        PÁGINA INICIAL
    ======================= */

    .home{
      width:100vw;
      height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    .title{
      font-size:3rem;
      font-weight:600;
      margin-bottom:10px;
    }

    .subtitle{
      font-size:1.1rem;
      opacity:0.8;
      margin-bottom:50px;
    }

    .cards{
      display:flex;
      gap:30px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      width:280px;
      height:280px;
      border-radius:22px;

      cursor:pointer;
      transition:0.4s;

      position:relative;


      box-shadow:
      0 8px 20px rgba(0,0,0,0.08),
      inset 0 0 0 3px rgba(255,255,255,0.25);
    }

    .card:hover{
      transform:translateY(-8px) scale(1.02);
    }

    .pink{
      background:linear-gradient(135deg,#f29a9a,#efb5a7);
    }

    .purple{
      background:linear-gradient(135deg,#a98fd4,#e3a3d8);
    }

    .yellow{
      background:linear-gradient(135deg,#ffd148,#f0d1a7);
    }

    .red{
      background:linear-gradient(135deg,#f29a9a,#efb5a7);
    }

    .card-content{
      width:100%;
      height:100%;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;
      color:white;

      backdrop-filter:blur(2px);
    }

    .icon{
      font-size:2.5rem;
      margin-bottom:20px;
    }

    .card h2{
      width:90%;
      font-size:2rem;
      font-weight:600;
      line-height:1.3;
    }

    /* =======================
        TELA INTERNA
    ======================= */

    .section{
      position: absolute;
      inset:0;

      display:none;
      overflow: hidden

      justify-content:center;
      align-items:center;
      flex-direction:column;

      transition:0.5s;
    }

    .section.active{
      display:flex;
    }

    .pink-bg{
      background:linear-gradient(135deg,#f29a9a,#efb5a7);
    }

    .purple-bg{
      background:linear-gradient(135deg,#a98fd4,#e3a3d8);
    }

    .yellow-bg{
      background:linear-gradient(135deg,#ffd148,#f0d1a7);
    }

    .red-bg{
      background:linear-gradient(135deg,#f29a9a,#efb5a7);
    }

    .back{
      position:absolute;
      top:20px;
      left:20px;

      border:none;
      background:rgba(255,255,255,0.25);

      color:white;

      padding:12px 20px;
      border-radius:999px;

      cursor:pointer;

      font-size:1rem;
      backdrop-filter:blur(6px);

      transition:0.3s;
    }

    .back:hover{
      transform:scale(1.05);
    }

    .clickText{
      color:white;
      font-size:2.5rem;
      font-weight:500;

      cursor:pointer;
      user-select:none;

      transition:0.3s;
    }

    .clickText:hover{
      transform:scale(1.05);
    }

    .message{
      position:absolute;

      color:white;
      font-size:4rem;
      font-weight:600;

      text-align:center;
      padding:20px;

      animation:fade 0.4s;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:scale(0.8);
      }

      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @media(max-width:700px){

      .title{
        font-size:2.3rem;
      }

      .card{
        width:240px;
        height:240px;
      }

      .message{
        font-size:2.5rem;
      }

      .clickText{
        font-size:2rem;
      }

    }

  </style>
</head>

<body>

  <!-- =======================
      HOME
  ======================= -->

  <div class="home" id="home">

    <h1 class="title">Para Meu Mozão ❤</h1>

    <p class="subtitle">
      Cada clique, um pedacinho do meu coração
    </p>

    <div class="cards">

      <div class="card pink" onclick="openSection('admire')">

        <div class="card-content">

          <div class="icon">♡</div>

          <h2>O que AMO em você</h2>

        </div>

      </div>

      <div class="card purple" onclick="openSection('dreams')">

        <div class="card-content">

          <div class="icon">✧</div>

          <h2>Coisas que quero fazer contigo</h2>

        </div>

      </div>

          <div class="cards">

      <div class="card yellow" onclick="openSection('esquecer')">

        <div class="card-content">

          <div class="icon">♡</div>

          <h2>Quero que nunca se esqueça</h2>

        </div>

      </div>

          <div class="cards">

      <div class="card red" onclick="openSection('capaz')">

        <div class="card-content">

          <div class="icon">✧</div>

          <h2>O que será?</h2>

        </div>

      </div>

    </div>

  </div>

  <!-- =======================
      ADMIRAÇÃO
  ======================= -->

  <div onclick="showAdmireText()" class="section pink-bg" id="admire">

    <button class="back" onclick="goBack()">
      ← Voltar
    </button>
    <p id="apaga1">Clique na tela</p>
    <div class="clickText" >
    </div>

    <div class="message" id="admireMessage"></div>

  </div>

  <!-- =======================
      SONHOS
  ======================= -->

  <div onclick="showDreamText()" class="section purple-bg" id="dreams">

    <button class="back" onclick="goBack()">
      ← Voltar
    </button>
    <p id="apaga2">Clique na tela</p>
    <div class="clickText">
    </div>

    <div class="message" id="dreamMessage"></div>

  </div>

    <div onclick="showEsquecerText()" class="section yellow-bg" id="esquecer">

    <button class="back" onclick="goBack()">
      ← Voltar
    </button>
    <p id="apaga3">Clique na tela</p>
    <div class="clickText" >
    </div>

    <div class="message" id="esquecerMessage"></div>

  </div>

    <div onclick="showCapazText()" class="section red-bg" id="capaz">

    <button class="back" onclick="goBack()">
      ← Voltar
    </button>
    <p id="apaga4">Clique na tela</p>
    <div class="clickText">
    </div>

    <div class="message" id="capazMessage"></div>

  </div>

  <script>

    const admireTexts = [

      "Seu sorriso",
      "Sua altura",
      "Sua coragem",
      "Sua força de vontade",
      "Seu abraço",
      "Sua inteligência",
      "Seu olhar",
      "Seu jeitinho",
      "Seu cuidado",
      "Seu esforço",
      "Sua voz",
      "Sua risada",
      "Seu abraço apertado",
      "Sua presença",
      "Suas mãos grandonas",
      "Sua pegada >:3",
      "Seu coração enorme",
      "Sua pica enorme >:3",
      "A segurança que você me passa"

    ];

    const dreamTexts = [

      "Viajar mundo a fora contigo",
      "Morar contigo",
      "cozinhar juntos",
      "Ir em restaurantes chiques contigo",
      "Dormir abraçados na nossa casa",
      "Dançar na chuva contigo",
      "Assistir filmes juntos em um dia chuvoso",
      "Conhecer lugares novos",
      "Ir a praia contigo",
      "Fazer um piquenique no parque",
      "Crescer na vida juntos",
      "Construir uma família contigo",
      "Envelhecer contigo",
      "Viver uma vida feliz ao seu lado",
      "Que nossa relação nunca mude",
      "Fazer trilha contigo para cachoeiras",

    ];

    const esquecerTexts = [

      "Você é inclivel",
      "Você é extremamente forte",
      "Você é inspiração de alguem",
      "Você é capaz de coisas incríveis",
      "Você é muito amado",
      "Você é único",
      "Você é tudo pra mim",
      "Eu acredito em você e no seu potencial",
      "Se você cair, eu vou estar aqui pra te ajudar a levantar",
      "Se você fracassar eu serei seu porto seguro para te ajudar a recomeçar",
      "Você é mais forte do que imagina",
      "Você é mais capaz do que imagina",
      "Eu to contigo pra tudo amor eu quero que conte comigo pra tudo",
      "Eu vou estar contigo nos momentos faceis e dificeis"



    ];

      const capazTexts = [

        "Trolei moi, eu não tive criatividade pra colocar algo aqui, é só isso mesmo 😅"
  
      ];

    function openSection(id){

      document.getElementById(id)
      .classList.add("active");

    }

    function goBack(){

      document.querySelectorAll(".section")
      .forEach(section => {

        section.classList.remove("active");

      });

    }

    function randomItem(array){

      return array[Math.floor(Math.random() * array.length)];

    }

    function showAdmireText(){

      document.getElementById("admireMessage")
      .innerText = randomItem(admireTexts);

      document.getElementById("apaga1").style.display = "none";

    }

    function showDreamText(){

      document.getElementById("dreamMessage")
      .innerText = randomItem(dreamTexts);

      document.getElementById("apaga2").style.display = "none";

    }

    function showEsquecerText(){

      document.getElementById("esquecerMessage")
      .innerText = randomItem(esquecerTexts);

      document.getElementById("apaga3").style.display = "none";

    }

    function showCapazText(){

      document.getElementById("capazMessage")
      .innerText = randomItem(capazTexts);

      document.getElementById("apaga4").style.display = "none";

    }

  </script>

</body>
</html>
